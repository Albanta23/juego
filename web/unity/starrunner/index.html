<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity Star Runner</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #172154, #05030f 62%, #010106);
      color: #eaffff;
      font-family: monospace;
    }
    .placeholder {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 22px;
      box-sizing: border-box;
      text-align: center;
    }
    .panel {
      width: min(680px, 92vw);
      border: 1px solid rgba(127, 92, 255, 0.55);
      border-radius: 10px;
      background: rgba(3, 2, 14, 0.78);
      box-shadow: 0 0 28px rgba(127, 92, 255, 0.18);
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      color: #7ffcff;
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(0,255,255,0.45);
    }
    p { color: #bcd; line-height: 1.5; }
    code {
      color: #ffff7a;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="placeholder">
    <section class="panel">
      <h1>UNITY STAR RUNNER</h1>
      <p>Ranura Unity WebGL integrada en el panel del arcade.</p>
      <p>Exporta el proyecto Unity como WebGL y copia el contenido del build en <code>web/unity/starrunner/</code> sustituyendo este archivo.</p>
      <p>El proyecto fuente esta en <code>unity/StarRunner/</code>.</p>
    </section>
  </main>
</body>
</html>
