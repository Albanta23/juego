<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Game Arcade</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <div id="dashboard">
    <div class="dashboard-header">
      <h1>Game Arcade</h1>
      <p>Selecciona un juego para jugar</p>
    </div>
    <div id="games-grid" class="games-grid"></div>
  </div>

  <div id="game-screen">
    <div class="game-toolbar">
      <button id="toolbar-back">← Menu</button>
      <span class="game-title"></span>
      <span class="game-score" id="toolbar-score">Score: 0</span>
      <button id="toolbar-pause" title="Pausa">Ⅱ</button>
      <button id="toolbar-sound" title="Sonido">SND</button>
    </div>
    <div class="game-canvas-container">
      <canvas id="game-canvas" width="600" height="500"></canvas>
    </div>
    <div id="touch-controls" class="touch-controls" aria-label="Controles tactiles"></div>
  </div>

  <script src="js/utils/vfx.js?v=5"></script>
  <script src="js/utils/audio.js?v=5"></script>
  <script src="js/utils/storage.js?v=5"></script>
  <script src="js/games/snake.js?v=5"></script>
  <script src="js/games/tetris.js?v=5"></script>
  <script src="js/games/pong.js?v=5"></script>
  <script src="js/games/game2048.js?v=5"></script>
  <script src="js/games/carreras.js?v=5"></script>
  <script src="js/games/graveknight.js?v=5"></script>
  <script src="js/games/starfighter.js?v=5"></script>
  <script src="js/dashboard.js?v=5"></script>
</body>
</html>
